name: CI

on: [pull_request, push]

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: install
              uses: actions/setup-node@v2
              with:
                node-version: '24.x'
            - name: install and build
              run: |
                npm install
                npm run build